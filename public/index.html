<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>zabelmly-web | Localhost</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <h1>Anatomía de zabelmly-web</h1>
        <div id="status-card" class="card">Conectando con el núcleo...</div>
        
        <div class="card">
            <h3>Escribir en la Base de Datos</h3>
            <input type="text" id="db-input" placeholder="Escribe un pensamiento para la base de datos...">
            <button onclick="guardarDato()">Guardar</button>
            
            <h4>Registros en tiempo real:</h4>
            <ul id="db-lista" style="text-align: left; list-style-type: square;"></ul>
        </div>
    </div>
    <script src="/js/main.js"></script>
</body>
